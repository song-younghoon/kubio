name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: bash -n install.sh
      - run: cargo fmt --all --check
      - run: cargo clippy --all-targets --all-features -- -D warnings
      - run: cargo test --workspace
      - run: cargo test --workspace --features experimental-http3
      - run: REQUESTS=10 MODE=auto bash examples/bench/local_smoke.sh
      - run: bash examples/bench/baseline_scenarios.sh
      - run: cargo run -p kubio-bench -- --requests 20 --protocol h1 --output json --fail-on-budget
      - run: cargo run -p kubio-bench -- --requests 20 --protocol h2 --output json --fail-on-budget
      - run: cargo run -p kubio-bench --features experimental-http3 -- --requests 20 --protocol h3 --output json --fail-on-budget

  supply-chain:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo install cargo-deny cargo-audit --locked
      - run: cargo deny check
      - run: cargo audit

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker build -t kubio:ci .
      - run: KUBIO_IMAGE=kubio:ci bash examples/bench/docker_smoke.sh
