name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  linux-x86_64:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: bash -n install.sh
      - run: cargo fmt --all --check
      - run: cargo clippy --all-targets --all-features -- -D warnings
      - run: cargo test --workspace
      - run: cargo test --workspace --features experimental-http3
      - run: bash examples/bench/baseline_scenarios.sh
      - run: mkdir -p dist/bench
      - run: cargo run -p kubio-bench -- --requests 50 --protocol h1 --output json --fail-on-budget > dist/bench/kubio-bench-h1.json
      - run: cargo run -p kubio-bench -- --requests 50 --protocol h2 --output json --fail-on-budget > dist/bench/kubio-bench-h2.json
      - run: cargo run -p kubio-bench --features experimental-http3 -- --requests 50 --protocol h3 --output json --fail-on-budget > dist/bench/kubio-bench-h3.json
      - run: cargo build --release -p kubio-cli
      - run: KUBIO_BIN=target/release/kubio bash examples/bench/release_smoke.sh
      - run: cp target/release/kubio dist/kubio-x86_64-unknown-linux-gnu
      - run: cargo build --release -p kubio-cli --features experimental-http3
      - run: cp target/release/kubio dist/kubio-x86_64-unknown-linux-gnu-http3-experimental
      - run: dist/kubio-x86_64-unknown-linux-gnu --help
      - run: dist/kubio-x86_64-unknown-linux-gnu --version
      - run: dist/kubio-x86_64-unknown-linux-gnu-http3-experimental --help
      - run: dist/kubio-x86_64-unknown-linux-gnu-http3-experimental --version
      - run: KUBIO_BIN=dist/kubio-x86_64-unknown-linux-gnu bash examples/bench/release_smoke.sh
      - run: cd dist && sha256sum kubio-x86_64-unknown-linux-gnu kubio-x86_64-unknown-linux-gnu-http3-experimental > SHA256SUMS
      - run: |
          bad_dist="$(mktemp -d)"
          cp dist/kubio-x86_64-unknown-linux-gnu "$bad_dist/"
          printf '%064d  kubio-x86_64-unknown-linux-gnu\n' 0 > "$bad_dist/SHA256SUMS"
          install_dir="$(mktemp -d)/bin"
          if KUBIO_DOWNLOAD_BASE_URL="file://${bad_dist}" KUBIO_INSTALL_DIR="$install_dir" bash install.sh; then
            echo "installer accepted a bad checksum" >&2
            exit 1
          fi
      - run: |
          install_dir="$(mktemp -d)/bin"
          KUBIO_DOWNLOAD_BASE_URL="file://${PWD}/dist" KUBIO_INSTALL_DIR="$install_dir" bash install.sh
          "$install_dir/kubio" --help
          "$install_dir/kubio" --version
          printf '{"tag_name":"v999.0.0","html_url":"https://github.com/%s/releases/tag/v999.0.0","prerelease":false}\n' "${{ github.repository }}" > dist/latest-fixture.json
          "$install_dir/kubio" update --check --release-api-url "file://${PWD}/dist/latest-fixture.json"
          version="$("$install_dir/kubio" --version)"
          set -- $version
          "$install_dir/kubio" update --version "v$2" --force --download-base-url "file://${PWD}/dist" --install-dir "$install_dir"
      - run: |
          install_dir="$(mktemp -d)/bin"
          KUBIO_DOWNLOAD_BASE_URL="file://${PWD}/dist" KUBIO_INSTALL_DIR="$install_dir" KUBIO_FLAVOR=http3-experimental bash install.sh
          "$install_dir/kubio" --help
      - uses: actions/upload-artifact@v4
        with:
          name: kubio-linux-x86_64
          path: |
            dist/kubio-x86_64-unknown-linux-gnu
            dist/kubio-x86_64-unknown-linux-gnu-http3-experimental
            dist/bench/*.json

  linux-arm64:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
      CC_aarch64_unknown_linux_gnu: aarch64-linux-gnu-gcc
      AR_aarch64_unknown_linux_gnu: aarch64-linux-gnu-ar
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-unknown-linux-gnu
      - uses: Swatinem/rust-cache@v2
      - run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends gcc-aarch64-linux-gnu libc6-dev-arm64-cross qemu-user file
      - run: mkdir -p dist
      - run: cargo build --release -p kubio-cli --target aarch64-unknown-linux-gnu
      - run: cp target/aarch64-unknown-linux-gnu/release/kubio dist/kubio-aarch64-unknown-linux-gnu
      - run: cargo build --release -p kubio-cli --features experimental-http3 --target aarch64-unknown-linux-gnu
      - run: cp target/aarch64-unknown-linux-gnu/release/kubio dist/kubio-aarch64-unknown-linux-gnu-http3-experimental
      - run: file dist/kubio-aarch64-unknown-linux-gnu | grep -E "ELF 64-bit.*aarch64|ELF 64-bit.*ARM aarch64"
      - run: qemu-aarch64 -L /usr/aarch64-linux-gnu dist/kubio-aarch64-unknown-linux-gnu --help
      - run: qemu-aarch64 -L /usr/aarch64-linux-gnu dist/kubio-aarch64-unknown-linux-gnu --version
      - run: qemu-aarch64 -L /usr/aarch64-linux-gnu dist/kubio-aarch64-unknown-linux-gnu-http3-experimental --help
      - run: qemu-aarch64 -L /usr/aarch64-linux-gnu dist/kubio-aarch64-unknown-linux-gnu-http3-experimental --version
      - run: cd dist && sha256sum kubio-aarch64-unknown-linux-gnu kubio-aarch64-unknown-linux-gnu-http3-experimental > SHA256SUMS
      - uses: actions/upload-artifact@v4
        with:
          name: kubio-linux-arm64
          path: |
            dist/kubio-aarch64-unknown-linux-gnu
            dist/kubio-aarch64-unknown-linux-gnu-http3-experimental

  macos-arm64:
    runs-on: [self-hosted, macOS, ARM64]
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - run: |
          test "$(uname -s)" = "Darwin"
          test "$(uname -m)" = "arm64"
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test -p kubio-cli
      - run: mkdir -p dist
      - run: cargo build --release -p kubio-cli
      - run: cp target/release/kubio dist/kubio-aarch64-apple-darwin
      - run: cargo build --release -p kubio-cli --features experimental-http3
      - run: cp target/release/kubio dist/kubio-aarch64-apple-darwin-http3-experimental
      - run: dist/kubio-aarch64-apple-darwin --help
      - run: dist/kubio-aarch64-apple-darwin --version
      - run: dist/kubio-aarch64-apple-darwin-http3-experimental --help
      - run: dist/kubio-aarch64-apple-darwin-http3-experimental --version
      - run: cd dist && shasum -a 256 kubio-aarch64-apple-darwin kubio-aarch64-apple-darwin-http3-experimental > SHA256SUMS
      - run: |
          install_dir="$(mktemp -d)/bin"
          KUBIO_DOWNLOAD_BASE_URL="file://${PWD}/dist" KUBIO_INSTALL_DIR="$install_dir" bash install.sh
          "$install_dir/kubio" --help
          "$install_dir/kubio" --version
          version="$("$install_dir/kubio" --version)"
          set -- $version
          "$install_dir/kubio" update --version "v$2" --force --download-base-url "file://${PWD}/dist" --install-dir "$install_dir"
      - uses: actions/upload-artifact@v4
        with:
          name: kubio-macos-arm64
          path: |
            dist/kubio-aarch64-apple-darwin
            dist/kubio-aarch64-apple-darwin-http3-experimental

  docker-image:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker build -t kubio:${{ github.ref_name }} .
      - run: docker run --rm kubio:${{ github.ref_name }} --help
      - run: KUBIO_IMAGE=kubio:${{ github.ref_name }} bash examples/bench/docker_smoke.sh

  publish-release:
    runs-on: ubuntu-latest
    needs: [linux-x86_64, linux-arm64, macos-arm64, docker-image]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: downloaded-artifacts
      - run: |
          mkdir -p dist
          find downloaded-artifacts -maxdepth 3 -type f -exec cp {} dist/ \;
      - run: bash -n install.sh
      - run: |
          cd dist
          binaries=(
            kubio-x86_64-unknown-linux-gnu
            kubio-x86_64-unknown-linux-gnu-http3-experimental
            kubio-aarch64-unknown-linux-gnu
            kubio-aarch64-unknown-linux-gnu-http3-experimental
            kubio-aarch64-apple-darwin
            kubio-aarch64-apple-darwin-http3-experimental
          )
          for binary in "${binaries[@]}"; do
            test -f "$binary"
          done
          sha256sum "${binaries[@]}" > SHA256SUMS
          for binary in "${binaries[@]}"; do
            grep -E "[[:space:]]${binary}$" SHA256SUMS >/dev/null
          done
          test -f kubio-bench-h1.json
          test -f kubio-bench-h2.json
          test -f kubio-bench-h3.json
      - uses: actions/upload-artifact@v4
        with:
          name: kubio-release-assets
          path: |
            dist/kubio-*
            dist/SHA256SUMS
            install.sh
      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          assets=(
            dist/kubio-x86_64-unknown-linux-gnu
            dist/kubio-x86_64-unknown-linux-gnu-http3-experimental
            dist/kubio-aarch64-unknown-linux-gnu
            dist/kubio-aarch64-unknown-linux-gnu-http3-experimental
            dist/kubio-aarch64-apple-darwin
            dist/kubio-aarch64-apple-darwin-http3-experimental
            dist/SHA256SUMS
            install.sh
            dist/kubio-bench-h1.json
            dist/kubio-bench-h2.json
            dist/kubio-bench-h3.json
          )
          if gh release view "${{ github.ref_name }}" --repo "${{ github.repository }}" >/dev/null 2>&1; then
            gh release upload "${{ github.ref_name }}" "${assets[@]}" --repo "${{ github.repository }}" --clobber
          else
            gh release create "${{ github.ref_name }}" "${assets[@]}" --repo "${{ github.repository }}" --title "${{ github.ref_name }}" --generate-notes
          fi
