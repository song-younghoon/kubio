version: 1

origin: "https://api.example.com"
mode: "auto"

server:
  listen: "0.0.0.0:8443"
  tls:
    cert: "certs/kubio.pem"
    key: "certs/kubio-key.pem"
  protocols:
    http1: true
    http2: true
    h2c: false
  http3:
    enabled: true
    listen: "0.0.0.0:8443"
    advertise: true
    authorities:
      - "api.example.com:443"
    alt_svc_ma: "1h"
    max_concurrent_streams: 128
    max_field_section_size: "64KiB"
    qpack_max_table_capacity: "0"
    max_udp_payload_size: "1350"
    idle_timeout: "30s"

origin_protocol:
  preferred: "http3"
  fallback: true
  http2_prior_knowledge: false
  http3_experimental: true
  http3_max_idle_connections: 32
  http3_idle_timeout: "90s"
  http3_ca_certs: []

policy:
  min_route_samples: 20
  min_key_repeats: 5
  min_shadow_validations: 5
