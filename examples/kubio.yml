version: 1

server:
  listen: "0.0.0.0:8080"
  origin_timeout_ms: 30000

origin: "http://localhost:3000"

mode: "watch"
freshness: "balanced"

dashboard:
  enabled: true
  listen: "127.0.0.1:9900"
  allow_public: false
  admin_api: true

policy:
  respect_origin_headers: true
  protect_authorization: true
  protect_cookies: true
  protect_set_cookie: true
  revalidation:
    enabled: true
    prefer_etag: true
    max_validator_length: 1024
  stale_if_error:
    mode: "origin"
    max_stale: "5m"
  query_intelligence:
    enabled: true
    auto_ignore: false
  adaptive_reuse:
    enabled: true
    key_validation:
      min_observations: 2
      min_shadow_matches: 1
      max_shadow_mismatches: 0
    public_object:
      enabled: true
      min_route_samples: 20
      min_distinct_keys: 3
      min_store_safe_rate: 0.98
      min_shadow_matches: 3
      max_shadow_mismatches: 0
    origin_public_fast_path:
      enabled: true
    precision:
      enabled: true
      confidence:
        fresh_window_secs: 1800
        min_window_samples: 20
        strong_window_samples: 100
        max_negative_events: 0
        cooldown_secs: 600
        max_cooldown_secs: 3600
        cooldown_backoff: 2.0
      query_equivalence:
        enabled: true
        auto_compact: false
        min_distinct_values: 3
        min_matching_fingerprints: 3
        min_base_keys: 1
        max_mismatches: 0
      canary:
        enabled: true
        probation_rate: 0.10
        validated_rate: 0.02
        strong_rate: 0.005
        min_interval_secs: 30
      slug:
        enabled: true
        min_distinct_values: 3
        min_route_samples: 20
      variants:
        max_values_per_dimension: 8
        require_variant_evidence: true
  max_object_size: "1MiB"
  max_fingerprint_body_size: "2MiB"
  response_header_equivalence:
    enabled: true
    verified_ignore:
      enabled: true
      auto_apply_known_metadata: true
      auto_apply_unknown: false
      min_distinct_values: 3
      min_matching_fingerprints: 3
      max_mismatches: 0
      cooldown_secs: 600
    serve:
      strip_volatile_on_hit: true
      strip_verified_ignored_on_hit: true
      add_age: true
      preserve_date: true
    default_volatile:
      add: []
      block: []
  min_route_samples: 100
  min_key_repeats: 5
  min_shadow_validations: 20
  max_shadow_mismatch_rate: 0.001

storage:
  kind: "memory"
  max_size: "256MiB"
  max_object_size: "1MiB"
  # path: ".kubio/cache"
  # sync: false

observability:
  metrics: true
  metrics_path: "/metrics"
  tracing: true

routes:
  - match:
      method: GET
      path: "/notice/{id}"
    query:
      verified_ignore:
        enabled: true
        allow: ["utm_*", "gclid", "fbclid"]
    safety:
      public_object: true

# Required when exposing admin APIs on a public dashboard address.
# admin_token: "change-me"
