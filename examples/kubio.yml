version: 1

server:
  listen: "0.0.0.0:8080"
  origin_timeout_ms: 30000

origin: "http://localhost:3000"

mode: "watch"
freshness: "balanced"

dashboard:
  enabled: true
  listen: "127.0.0.1:9900"
  allow_public: false
  admin_api: true

policy:
  respect_origin_headers: true
  protect_authorization: true
  protect_cookies: true
  protect_set_cookie: true
  revalidation:
    enabled: true
    prefer_etag: true
    max_validator_length: 1024
  stale_if_error:
    mode: "origin"
    max_stale: "5m"
  query_intelligence:
    enabled: true
    auto_ignore: false
  max_object_size: "1MiB"
  max_fingerprint_body_size: "2MiB"
  min_route_samples: 100
  min_key_repeats: 5
  min_shadow_validations: 20
  max_shadow_mismatch_rate: 0.001

storage:
  kind: "memory"
  max_size: "256MiB"
  max_object_size: "1MiB"
  # path: ".kubio/cache"
  # sync: false

observability:
  metrics: true
  metrics_path: "/metrics"
  tracing: true

# Required when exposing admin APIs on a public dashboard address.
# admin_token: "change-me"
